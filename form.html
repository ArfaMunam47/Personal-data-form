<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML FORM</title>
  <style>
    fieldset{
      border:5px solid black;
    }
    legend{
      border:5px solid black;
      font-weight: bold;
      font-size: 40px;
    }
  </style>
</head>
<body>
  <form action="/action-page.php" method="get">
 <fieldset>
  <legend>Personal Details</legend>
    <label for="">Name</label>
    <input type="text" name="fname" placeholder="Enter your name"><br><br>
    <label for="">Password</label>
    <input type="password" name="fname"> <br><br>
   <label for="">Gender</label>
   <input type="radio" name="Gender" id="Male"><label for="Male">Male</label>
    <input type="radio" name="Gender" id="Female"><label for="Female">Female</label><br><br>
    <label for="">Hobbies</label>
   <input type="checkbox" name="Hobbies" id="Reading"><label for="Reading">Reading</label>
   <input type="checkbox" name="Hobbies" id="Writing"><label for="Writing">Writing</label>
    <input type="checkbox" name="Hobbies" id="Playing"><label for="Playing">Playing</label><br><br>
    <label for="">Message</label>
    <textarea rows="20" cols="90" placeholder="Write yout message here.."></textarea> <br><br>
    <label for="">Country</label>
    <select size="4" multiple>
      <option value="pk">Pakistan</option>
      <option value="in">India</option>
      <option value="ch">China</option>
      <option value="cn">Canada</option>
      <option value="eg">Egypt</option>
    </select> <br><br>
    <label for="">Games</label>
    <select >
    <optgroup label="Indoor Games">
      <option value="Ludo">Ludo</option>
        <option value="Chess">Chess</option>
          <option value="Table Tennis">Table Tennis</option>
            <option value="Swings">Swings</option>
    </optgroup>
    <optgroup label="Outdoor Games">
      <option value="Cricket">Cricket</option>
        <option value="Badminton">Badminton</option>
          <option value="Hockey">Hockey</option>
            <option value="Football">Football</option>
    </optgroup>
    </select><br><br>
<label for="">Photo</label>
 <input type="file" accept="image/*"><br><br>
 <label for="">File Upload</label>
 <input type="file" accept="audio/mp3"><br><br>
 <label for="">Cars</label>
 <input list="Cars">
 <datalist id="Cars">
  <option value="Toyota Corolla">
    <option value="Honda Civic">
      <option value="TFord Mustang">
        <option value="BMW 3 Series">
          <option value="Mercedes-Benz C-Class">
            <option value="Audi A4">
              <option value="Tesla Model 3">
                <option value="Hyundai Elantra"></option>
 </datalist><br><br>
 <label for="">Color</label>
 <input type="color"><br><br>
 <label for="">Number</label>
 <input type="number" min="0" max="100" step="10"><br><br>
 <label for="">Range</label>
 <input type="range" min="0" max="100" step="10"><br><br>
 <label for="">Date</label>
 <input type="date"><br><br>
 <label for="">Datetime</label>
 <input type="Datetime-local"><br><br>
 <label for="">Month</label>
 <input type="month"><br><br>
 <label for="">Week</label>
 <input type="week"><br><br>
 <label for="">Email</label>
 <input type="email"><br><br>
 <input type="submit"><br><br>
  <label for="">URL</label>
 <input type="url"><br><br>
  <label for="">Search</label>
 <input type="search"><br><br>
  <label for="">Telephone Number</label>
 <input type="tel"><br><br>





  <input type="submit" value="Save">
 <input type="Reset" value="Reset">
 <input type="image" src="https://tse4.mm.bing.net/th/id/OIP.0ezKGaLDGntqPGKLlVw1jAHaHa?pid=Api&P=0&h=220" height="60px">
 </fieldset>



  </form>
  
</body>
</html>
